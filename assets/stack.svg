<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }
      :root { --bg:#f8f9fa; --border:#dee2e6; --text:#212529; --muted:#495057; --dim:#adb5bd; --accent:#4d6bfe; }
      @media (prefers-color-scheme: dark) { :root { --bg:#0d1117; --border:#30363d; --text:#c9d1d9; --muted:#8b949e; --dim:#484f58; --accent:#4d6bfe; } }
    </style>
  </defs>
  <rect x="0" y="0" width="800" height="220" rx="8" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>

  <text x="40" y="40" font-size="14" font-weight="700" fill="var(--text)">TECH STACK</text>
  <line x1="40" y1="55" x2="760" y2="55" stroke="var(--border)" stroke-width="1"/>

  <!-- Languages -->
  <text x="40" y="85" font-size="11" fill="var(--muted)">LANGUAGES</text>
  <rect x="40" y="95" width="100" height="28" rx="5" fill="var(--accent)" opacity=".1"/>
  <text x="50" y="114" font-size="11" font-weight="600" fill="var(--accent)">Python</text>
  <rect x="150" y="95" width="100" height="28" rx="5" fill="var(--accent)" opacity=".1"/>
  <text x="160" y="114" font-size="11" font-weight="600" fill="var(--accent)">TypeScript</text>
  <rect x="260" y="95" width="100" height="28" rx="5" fill="var(--accent)" opacity=".1"/>
  <text x="270" y="114" font-size="11" font-weight="600" fill="var(--accent)">JavaScript</text>
  <rect x="370" y="95" width="80" height="28" rx="5" fill="var(--accent)" opacity=".1"/>
  <text x="378" y="114" font-size="11" font-weight="600" fill="var(--accent)">HTML</text>

  <!-- Frameworks -->
  <text x="40" y="155" font-size="11" fill="var(--muted)">FRAMEWORKS &amp; TOOLS</text>
  <rect x="40" y="165" width="100" height="28" rx="5" fill="var(--accent)" opacity=".1"/>
  <text x="50" y="184" font-size="11" font-weight="600" fill="var(--accent)">React</text>
  <rect x="150" y="165" width="90" height="28" rx="5" fill="var(--accent)" opacity=".1"/>
  <text x="158" y="184" font-size="11" font-weight="600" fill="var(--accent)">FastAPI</text>
  <rect x="250" y="165" width="110" height="28" rx="5" fill="var(--accent)" opacity=".1"/>
  <text x="258" y="184" font-size="11" font-weight="600" fill="var(--accent)">Whisper AI</text>
  <rect x="370" y="165" width="70" height="28" rx="5" fill="var(--accent)" opacity=".1"/>
  <text x="378" y="184" font-size="11" font-weight="600" fill="var(--accent)">Ollama</text>
</svg>