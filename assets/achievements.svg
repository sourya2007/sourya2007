<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="800" height="200" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <!-- Trophy icon -->
  <text x="40" y="40" font-size="24">🏆</text>
  <text x="80" y="40" font-size="14" font-weight="700" fill="#212529">Hackathon Wins</text>

  <!-- AXIORA -->
  <rect x="40" y="60" width="720" height="36" rx="6" fill="#ffffff" stroke="#e9ecef" stroke-width="1"/>
  <text x="60" y="84" font-size="12" font-weight="700" fill="#4d6bfe">AXIORA 2026</text>
  <text x="220" y="84" font-size="12" fill="#495057">1st Place</text>
  <text x="350" y="84" font-size="11" fill="#adb5bd">AI / ML Hackathon — built an end-to-end Gen AI solution</text>

  <!-- SMART VERSE -->
  <rect x="40" y="104" width="720" height="36" rx="6" fill="#ffffff" stroke="#e9ecef" stroke-width="1"/>
  <text x="60" y="128" font-size="12" font-weight="700" fill="#4d6bfe">SMART VERSE 2026</text>
  <text x="220" y="128" font-size="12" fill="#495057">1st Place</text>
  <text x="350" y="128" font-size="11" fill="#adb5bd">Innovation Challenge — recognized for creative problem-solving</text>

  <!-- Certifications -->
  <text x="40" y="170" font-size="24">📜</text>
  <text x="80" y="170" font-size="14" font-weight="700" fill="#212529">Certifications</text>

  <rect x="40" y="185" width="180" height="24" rx="5" fill="#4d6bfe" opacity="0.1"/>
  <text x="52" y="201" font-size="11" font-weight="600" fill="#4d6bfe">Microsoft Gen AI Fundamentals</text>

  <rect x="235" y="185" width="150" height="24" rx="5" fill="#4d6bfe" opacity="0.1"/>
  <text x="247" y="201" font-size="11" font-weight="600" fill="#4d6bfe">IBM Data Science</text>
</svg>
