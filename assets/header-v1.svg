<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <!-- Terminal window frame -->
  <rect x="0" y="0" width="800" height="160" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="32" rx="10" fill="#e9ecef"/>
  <rect x="0" y="16" width="800" height="16" fill="#e9ecef"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="16" r="6" fill="#febc2e"/>
  <circle cx="62" cy="16" r="6" fill="#28c840"/>

  <!-- Title text -->
  <text x="400" y="21" text-anchor="middle" font-size="11" font-weight="400" fill="#6c757d">sourya@github ~ cat welcome.txt</text>

  <!-- Content -->
  <text x="40" y="62" font-size="12" font-weight="400" fill="#adb5bd">sourya@github:~$</text>
  <text x="200" y="62" font-size="14" font-weight="700" fill="#212529">echo "Hi, I'm Sourya Paul 👋"</text>

  <text x="40" y="92" font-size="28" font-weight="800" fill="#4d6bfe">Hi, I'm Sourya Paul</text>
  <text x="40" y="125" font-size="14" font-weight="400" fill="#495057">Student Developer · AI / ML Engineer · Hackathon Winner · Lifelong Builder</text>

  <!-- Blinking cursor -->
  <rect x="360" y="112" width="10" height="20" fill="#4d6bfe">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
