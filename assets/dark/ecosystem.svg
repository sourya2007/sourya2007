<svg viewBox="0 0 1000 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="System map: AI/ML projects, web apps, blockchain tools, all from one pipeline">
  <style>
    :root { --bone:#ffffff; --muted:#8b949e; --dim:#484f58; --rule:#30363d; --node-bg:#0d1117; --core-bg:#161b22; --accent:#4d6bfe; }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .node { fill: none; stroke: var(--rule); stroke-width: 1; }
    .wire { stroke: var(--rule); stroke-width: 1; stroke-dasharray: 500; stroke-dashoffset: 500; animation: draw 1.6s cubic-bezier(.6,0,.2,1) forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .w1{animation-delay:.2s}.w2{animation-delay:.32s}.w3{animation-delay:.44s}.w4{animation-delay:.56s}.w5{animation-delay:.68s}.w6{animation-delay:.8s}.w7{animation-delay:.92s}
    .pop { opacity: 0; animation: pop .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes pop { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .p0{animation-delay:.1s}.p1{animation-delay:.6s}.p2{animation-delay:.7s}.p3{animation-delay:.8s}.p4{animation-delay:.9s}.p5{animation-delay:1.0s}.p6{animation-delay:1.1s}.p7{animation-delay:1.2s}
    .core { animation: breathe 3.2s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.55} }
    @media (prefers-reduced-motion: reduce) { .wire,.pop,.core { animation: none; } .wire{stroke-dashoffset:0} .pop{opacity:1} }
    :root { --bone:#c9d1d9; --muted:#8b949e; --dim:#484f58; --rule:#30363d; --accent:#4d6bfe; --node-bg:#0d1117; --core-bg:#161b22; }
  </style>

  <defs>
    <mask id="ncut" maskUnits="userSpaceOnUse" x="0" y="0" width="1000" height="600">
      <rect x="0" y="0" width="1000" height="600" fill="white"/>
      <rect x="400" y="240" width="200" height="56" fill="black"/>
      <rect x="60" y="60" width="180" height="54" fill="black"/>
      <rect x="60" y="190" width="180" height="54" fill="black"/>
      <rect x="60" y="320" width="180" height="54" fill="black"/>
      <rect x="300" y="420" width="180" height="54" fill="black"/>
      <rect x="560" y="60" width="180" height="54" fill="black"/>
      <rect x="560" y="190" width="180" height="54" fill="black"/>
      <rect x="560" y="320" width="180" height="54" fill="black"/>
    </mask>
  </defs>

  <rect x="0" y="0" width="1000" height="600" fill="#0d1117"/>
  <line x1="48" y1="40" x2="952" y2="40" stroke="var(--rule)"/>
  <text fill="var(--muted)" class="mono" x="48" y="28" font-size="11" letter-spacing="3.5">SYSTEM MAP — EVERYTHING FROM ONE PIPELINE</text>
  <text fill="var(--muted)" class="mono" x="952" y="28" font-size="11" letter-spacing="3.5" text-anchor="end">FIG. 01</text>

  <g mask="url(#ncut)">
    <line class="wire w1" x1="500" y1="296" x2="210" y2="126"/>
    <line class="wire w2" x1="500" y1="296" x2="210" y2="256"/>
    <line class="wire w3" x1="500" y1="296" x2="210" y2="386"/>
    <line class="wire w4" x1="500" y1="296" x2="390" y2="450"/>
    <line class="wire w5" x1="500" y1="296" x2="650" y2="126"/>
    <line class="wire w6" x1="500" y1="296" x2="650" y2="256"/>
    <line class="wire w7" x1="500" y1="296" x2="650" y2="386"/>
  </g>

  <text fill="var(--accent)" class="mono pop p0" x="150" y="44" font-size="10" letter-spacing="3" text-anchor="middle">AI &amp; ML</text>
  <text fill="var(--accent)" class="mono pop p0" x="650" y="44" font-size="10" letter-spacing="3" text-anchor="middle">WEB &amp; APPS</text>
  <text fill="var(--accent)" class="mono pop p0" x="500" y="530" font-size="10" letter-spacing="3" text-anchor="middle">SECURITY &amp; INFRA</text>

  <g class="pop p0">
    <rect class="core" x="400" y="240" width="200" height="56" rx="2" fill="var(--core-bg)" stroke="var(--rule)" stroke-width="1"/>
    <text fill="var(--bone)" class="mono" x="500" y="264" font-size="13" letter-spacing="2" text-anchor="middle">SOURYA.SYS</text>
    <text fill="var(--muted)" class="mono" x="500" y="282" font-size="8.5" letter-spacing="0.5" text-anchor="middle">one-person build pipeline</text>
  </g>

  <g class="pop p1"><rect class="node" x="60" y="60" width="180" height="54" rx="2" fill="var(--node-bg)"/><text fill="var(--bone)" class="mono" x="150" y="83" font-size="12" letter-spacing="1" text-anchor="middle">Rescue AI</text><text fill="var(--muted)" class="mono" x="150" y="102" font-size="9" letter-spacing="1" text-anchor="middle">emergency transcription · DSP · AI</text></g>
  <g class="pop p2"><rect class="node" x="60" y="190" width="180" height="54" rx="2" fill="var(--node-bg)"/><text fill="var(--bone)" class="mono" x="150" y="213" font-size="12" letter-spacing="1" text-anchor="middle">Veritas AI</text><text fill="var(--muted)" class="mono" x="150" y="232" font-size="9" letter-spacing="1" text-anchor="middle">fact-checking · NLP · deep learning</text></g>
  <g class="pop p3"><rect class="node" x="60" y="320" width="180" height="54" rx="2" fill="var(--node-bg)"/><text fill="var(--bone)" class="mono" x="150" y="343" font-size="12" letter-spacing="1" text-anchor="middle">EduFlow</text><text fill="var(--muted)" class="mono" x="150" y="362" font-size="9" letter-spacing="1" text-anchor="middle">adaptive learning · AI</text></g>
  <g class="pop p4"><rect class="node" x="300" y="420" width="180" height="54" rx="2" fill="var(--node-bg)"/><text fill="var(--bone)" class="mono" x="390" y="443" font-size="12" letter-spacing="1" text-anchor="middle">BioChain Wallet</text><text fill="var(--muted)" class="mono" x="390" y="462" font-size="9" letter-spacing="1" text-anchor="middle">biometric · blockchain · MFA</text></g>
  <g class="pop p5"><rect class="node" x="560" y="60" width="180" height="54" rx="2" fill="var(--node-bg)"/><text fill="var(--bone)" class="mono" x="650" y="83" font-size="12" letter-spacing="1" text-anchor="middle">monostroke</text><text fill="var(--muted)" class="mono" x="650" y="102" font-size="9" letter-spacing="1" text-anchor="middle">portfolio · React · design</text></g>
  <g class="pop p6"><rect class="node" x="560" y="190" width="180" height="54" rx="2" fill="var(--node-bg)"/><text fill="var(--bone)" class="mono" x="650" y="213" font-size="12" letter-spacing="1" text-anchor="middle">DeckFrame</text><text fill="var(--muted)" class="mono" x="650" y="232" font-size="9" letter-spacing="1" text-anchor="middle">presentation tool · web</text></g>
  <g class="pop p7"><rect class="node" x="560" y="320" width="180" height="54" rx="2" fill="var(--node-bg)"/><text fill="var(--bone)" class="mono" x="650" y="343" font-size="12" letter-spacing="1" text-anchor="middle">Swasthya Sarathi</text><text fill="var(--muted)" class="mono" x="650" y="362" font-size="9" letter-spacing="1" text-anchor="middle">healthcare · TypeScript</text></g>

  <line x1="48" y1="500" x2="952" y2="500" stroke="var(--rule)"/>
  <text fill="var(--dim)" class="mono" x="48" y="520" font-size="9" letter-spacing="2">17 REPOSITORIES · 23 STARS · 6 FOLLOWERS</text>
  <text fill="var(--dim)" class="mono" x="952" y="520" font-size="9" letter-spacing="2" text-anchor="end">DASHED LINES — DATA IN MOTION</text>
</svg>