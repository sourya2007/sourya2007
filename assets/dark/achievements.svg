<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="800" height="200" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Trophy icon -->
  <text x="40" y="40" font-size="24">🏆</text>
  <text x="80" y="40" font-size="14" font-weight="700" fill="#c9d1d9">Hackathon Wins</text>

  <!-- AXIORA -->
  <rect x="40" y="60" width="720" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
