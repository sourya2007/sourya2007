  <rect x="40" y="185" width="180" height="24" rx="5" fill="#4d6bfe" opacity="0.15"/>
  <text x="52" y="201" font-size="11" font-weight="600" fill="#4d6bfe">Microsoft Gen AI Fundamentals</text>

  <rect x="235" y="185" width="150" height="24" rx="5" fill="#4d6bfe" opacity="0.15"/>
  <text x="247" y="201" font-size="11" font-weight="600" fill="#4d6bfe">IBM Data Science</text>
</svg>
