  <text x="220" y="84" font-size="12" fill="#8b949e">1st Place</text>
  <text x="350" y="84" font-size="11" fill="#484f58">AI / ML Hackathon — built an end-to-end Gen AI solution</text>

  <!-- SMART VERSE -->
  <rect x="40" y="104" width="720" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="128" font-size="12" font-weight="700" fill="#4d6bfe">SMART VERSE 2026</text>
  <text x="220" y="128" font-size="12" fill="#8b949e">1st Place</text>
  <text x="350" y="128" font-size="11" fill="#484f58">Innovation Challenge — recognized for creative problem-solving</text>

  <!-- Certifications -->
  <text x="40" y="170" font-size="24">📜</text>
