<svg xmlns="http://www.w3.org/2000/svg" width="800" height="90" viewBox="0 0 800 90">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }
      :root { --bone:#212529; --rule:#dee2e6; --muted:#495057; --accent:#4d6bfe; --bg:#f8f9fa; }
      @media (prefers-color-scheme: dark) { :root { --bone:#c9d1d9; --rule:#30363d; --muted:#8b949e; --accent:#4d6bfe; --bg:#0d1117; } }
    </style>
  </defs>
  <rect x="0" y="0" width="800" height="90" rx="8" fill="var(--bg)" stroke="var(--rule)" stroke-width="1"/>
  <line x1="40" y1="24" x2="760" y2="24" stroke="var(--rule)" stroke-width="1"/>

  <circle cx="60" cy="55" r="4" fill="var(--accent)">
    <animate attributeName="opacity" values="1;.2;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="55" r="8" fill="none" stroke="var(--accent)" stroke-width="1" opacity=".4">
    <animate attributeName="r" values="4;14;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".6;0;.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="82" y="52" font-size="12" letter-spacing="3" fill="var(--bone)">STATUS — BUILDING</text>
  <text x="82" y="72" font-size="11" letter-spacing="2" fill="var(--muted)">probably in a terminal, probably past midnight</text>

  <text x="760" y="55" font-size="13" text-anchor="end" fill="var(--muted)">themonostroke.vercel.app&#160;&#160;·&#160;&#160;Kolkata, IN</text>
</svg>