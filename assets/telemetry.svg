<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }
      .bar { fill: #212529; animation: pulse 2s ease-in-out infinite; }
      .bar-d { fill: #adb5bd; animation: pulse 2s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
      .b1{animation-delay:0s} .b2{animation-delay:.15s} .b3{animation-delay:.3s} .b4{animation-delay:.45s} .b5{animation-delay:.6s} .b6{animation-delay:.75s} .b7{animation-delay:.9s} .b8{animation-delay:1.05s}
      @media (prefers-reduced-motion: reduce) { .bar,.bar-d { animation: none; opacity: .6; } }
      :root { --bg:#f8f9fa; --border:#dee2e6; --text:#212529; --muted:#495057; --dim:#adb5bd; --accent:#4d6bfe; }
      @media (prefers-color-scheme: dark) { :root { --bg:#0d1117; --border:#30363d; --text:#c9d1d9; --muted:#8b949e; --dim:#484f58; --accent:#4d6bfe; } }
    </style>
  </defs>
  <rect x="0" y="0" width="800" height="180" rx="8" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>
  <text x="40" y="35" font-size="13" font-weight="700" fill="var(--text)">DEV TELEMETRY — LIVE</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="var(--border)" stroke-width="1"/>

  <!-- Activity bars -->
  <text x="40" y="80" font-size="11" fill="var(--muted)">CODING ACTIVITY</text>
  <rect class="bar b1" x="40" y="90" width="12" height="40" rx="2"/>
  <rect class="bar b2" x="60" y="95" width="12" height="35" rx="2"/>
  <rect class="bar b3" x="80" y="85" width="12" height="45" rx="2"/>
  <rect class="bar b4" x="100" y="100" width="12" height="30" rx="2"/>
  <rect class="bar b5" x="120" y="80" width="12" height="50" rx="2"/>
  <rect class="bar b6" x="140" y="90" width="12" height="40" rx="2"/>
  <rect class="bar b7" x="160" y="105" width="12" height="25" rx="2"/>
  <rect class="bar b8" x="180" y="85" width="12" height="45" rx="2"/>

  <text x="40" y="155" font-size="10" fill="var(--dim)">Python</text>
  <text x="100" y="155" font-size="10" fill="var(--dim)">TypeScript</text>
  <text x="180" y="155" font-size="10" fill="var(--dim)">JavaScript</text>

  <!-- Stats -->
  <text x="320" y="80" font-size="11" fill="var(--muted)">REPOS</text>
  <text x="320" y="110" font-size="24" font-weight="700" fill="var(--accent)">17</text>

  <text x="440" y="80" font-size="11" fill="var(--muted)">STARS</text>
  <text x="440" y="110" font-size="24" font-weight="700" fill="var(--accent)">23</text>

  <text x="560" y="80" font-size="11" fill="var(--muted)">FOLLOWERS</text>
  <text x="560" y="110" font-size="24" font-weight="700" fill="var(--accent)">6</text>

  <!-- Pulse dot -->
  <circle cx="680" cy="95" r="4" fill="#28c840">
    <animate attributeName="opacity" values="1;.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="695" y="99" font-size="10" fill="var(--muted)">active</text>
</svg>