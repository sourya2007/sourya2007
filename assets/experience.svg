<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }
      .rise { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
      @keyframes rise { from { opacity:0;transform:translateY(8px); } to { opacity:1;transform:translateY(0); } }
      .a1{animation-delay:.15s} .a2{animation-delay:.35s} .a3{animation-delay:.55s}
      @media (prefers-reduced-motion: reduce) { .rise { animation: none; opacity: 1; } }
      :root { --bone:#212529; --rule:#dee2e6; --muted:#495057; --dim:#adb5bd; --accent:#4d6bfe; --bg:#f8f9fa; }
      @media (prefers-color-scheme: dark) { :root { --bone:#c9d1d9; --rule:#30363d; --muted:#8b949e; --dim:#484f58; --accent:#4d6bfe; --bg:#0d1117; } }
    </style>
  </defs>
  <rect x="0" y="0" width="800" height="280" rx="8" fill="var(--bg)" stroke="var(--rule)" stroke-width="1"/>

  <line x1="120" y1="20" x2="120" y2="260" stroke="var(--rule)" stroke-width="1" opacity=".4"/>

  <g class="rise a1">
    <text x="48" y="60" font-size="12" fill="var(--accent)" letter-spacing="2">2026</text>
    <text x="136" y="60" font-size="14" font-weight="600" fill="var(--bone)">IIFR DGX Spark Internship</text>
    <text x="136" y="85" font-size="12" fill="var(--muted)">Project repo for IIFR DGX Spark Internship · Python · MIT</text>
    <text x="136" y="107" font-size="12" fill="var(--muted)">Hands-on with enterprise AI infrastructure and GPU computing</text>
  </g>

  <g class="rise a2">
    <text x="48" y="155" font-size="12" fill="var(--accent)" letter-spacing="2">2025–</text>
    <text x="136" y="155" font-size="14" font-weight="600" fill="var(--bone)">Independent AI/ML Development</text>
    <text x="136" y="180" font-size="12" fill="var(--muted)">Built multiple end-to-end AI applications — NLP, computer vision,</text>
    <text x="136" y="202" font-size="12" fill="var(--muted)">speech processing, and blockchain-integrated systems</text>
  </g>

  <g class="rise a3">
    <text x="48" y="248" font-size="12" fill="var(--accent)" letter-spacing="2">NOW</text>
    <text x="136" y="248" font-size="14" font-weight="600" fill="var(--bone)">Institute of Engineering &amp; Management · Kolkata</text>
  </g>
</svg>