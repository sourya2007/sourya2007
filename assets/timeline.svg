<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }
      .rise { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
      @keyframes rise { from { opacity:0;transform:translateY(8px); } to { opacity:1;transform:translateY(0); } }
      .a1{animation-delay:.15s} .a2{animation-delay:.35s} .a3{animation-delay:.55s} .a4{animation-delay:.75s}
      @media (prefers-reduced-motion: reduce) { .rise { animation: none; opacity: 1; } }
      :root { --bone:#212529; --rule:#dee2e6; --muted:#495057; --dim:#adb5bd; --accent:#4d6bfe; --bg:#f8f9fa; }
      @media (prefers-color-scheme: dark) { :root { --bone:#c9d1d9; --rule:#30363d; --muted:#8b949e; --dim:#484f58; --accent:#4d6bfe; --bg:#0d1117; } }
    </style>
  </defs>
  <rect x="0" y="0" width="800" height="300" rx="8" fill="var(--bg)" stroke="var(--rule)" stroke-width="1"/>

  <line x1="120" y1="20" x2="120" y2="280" stroke="var(--rule)" stroke-width="1" opacity=".4"/>

  <g class="rise a1">
    <text x="48" y="55" font-size="12" fill="var(--accent)" letter-spacing="2">2024</text>
    <text x="136" y="55" font-size="14" font-weight="600" fill="var(--bone)">GitHub Foundations</text>
    <text x="136" y="78" font-size="12" fill="var(--muted)">Started open-source journey · GitHub Skills · Python exploration</text>
  </g>

  <g class="rise a2">
    <text x="48" y="128" font-size="12" fill="var(--accent)" letter-spacing="2">2025</text>
    <text x="136" y="128" font-size="14" font-weight="600" fill="var(--bone)">IBM Data Science Certified</text>
    <text x="136" y="151" font-size="12" fill="var(--muted)">Data science foundations · AI/ML coursework · Python mastery</text>
  </g>

  <g class="rise a3">
    <text x="48" y="201" font-size="12" fill="var(--accent)" letter-spacing="2">2026</text>
    <text x="136" y="201" font-size="14" font-weight="600" fill="var(--bone)">Hackathons &amp; Project Explosion</text>
    <text x="136" y="224" font-size="12" fill="var(--muted)">AXIORA + SMART VERSE 1st Place · Microsoft Gen AI cert</text>
    <text x="136" y="244" font-size="12" fill="var(--muted)">Rescue AI · Veritas AI · BioChain-Wallet · EduFlow · IIFR Internship</text>
  </g>
</svg>